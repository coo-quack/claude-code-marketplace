name: CI

on:
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate marketplace.json
        run: |
          node -e "
            const m = require('./.claude-plugin/marketplace.json');
            if (!m.name) throw new Error('missing name');
            if (!m.metadata?.version) throw new Error('missing metadata.version');
            if (!/^\d+\.\d+\.\d+(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?$/.test(m.metadata.version)) throw new Error('metadata.version must be semver: ' + m.metadata.version);
            if (!m.plugins || !m.plugins.length) throw new Error('no plugins listed');
            for (const p of m.plugins) {
              if (!p.name) throw new Error('plugin missing name');
              if (!p.source) throw new Error(p.name + ' missing source');
              if (!p.version) throw new Error(p.name + ' missing version');
            }
            console.log('Valid: ' + m.plugins.length + ' plugins (v' + m.metadata.version + ')');
          "

      - name: Validate version is a valid git ref
        run: |
          VERSION=$(node -p "require('./.claude-plugin/marketplace.json').metadata.version")
          git check-ref-format "refs/tags/v$VERSION"
